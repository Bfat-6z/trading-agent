[pytest]
# Restrict collection to the repo's own tests. Without this, a bare `pytest`
# from the repo root recurses into venv/site-packages (numpy/pandas/matplotlib)
# and appears to "hang" for minutes during collection. Root cause of the
# >129s no-output timeout. See plans/260701-0200-claude-takeover-edge-first.
testpaths = tests
norecursedirs = venv .venv node_modules state plans .git tradingagents_crypto_src/tests build dist __pycache__
addopts = -p no:cacheprovider --durations=10
